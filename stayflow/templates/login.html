{% extends 'base.html' %}
{% block title %}Login - StayFlow{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="auth-icon">🏨</span>
            <h1>StayFlow</h1>
            <p>Panel de gestión hotelera</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="admin@stayflow.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Iniciar sesión</button>
        </form>
        <p class="auth-hint">Acceso por defecto: <strong>admin@stayflow.com</strong> / <strong>admin123</strong></p>
    </div>
</div>
{% endblock %}
