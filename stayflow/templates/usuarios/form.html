{% extends 'base.html' %}
{% block title %}{% if usuario %}Editar{% else %}Nuevo{% endif %} Usuario - StayFlow{% endblock %}
{% block content %}
<div class="page-header">
    <h2>{% if usuario %}Editar usuario{% else %}Nuevo usuario{% endif %}</h2>
    <a href="{{ url_for('usuarios_lista') }}" class="btn btn-outline">← Volver</a>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" name="nombre" required value="{{ usuario.nombre if usuario else '' }}">
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required value="{{ usuario.email if usuario else '' }}">
        </div>
        {% if not usuario %}
        <div class="form-group">
            <label>Contraseña *</label>
            <input type="password" name="password" required minlength="6">
        </div>
        {% endif %}
        <div class="form-group">
            <label>Rol</label>
            <select name="rol">
                <option value="recepcionista" {% if usuario and usuario.rol=='recepcionista' %}selected{% endif %}>Recepcionista</option>
                <option value="admin"         {% if usuario and usuario.rol=='admin' %}selected{% endif %}>Administrador</option>
            </select>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('usuarios_lista') }}" class="btn btn-outline">Cancelar</a>
            <button type="submit" class="btn btn-primary">{% if usuario %}Guardar cambios{% else %}Crear usuario{% endif %}</button>
        </div>
    </form>
</div>
{% endblock %}
