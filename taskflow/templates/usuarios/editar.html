{% extends 'base.html' %}
{% block title %}Editar Usuario - TaskFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Editar usuario</h2>
    <a href="{{ url_for('usuarios_lista') }}" class="btn btn-outline">← Volver</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" name="nombre" required value="{{ usuario.nombre }}">
        </div>
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required value="{{ usuario.email }}">
        </div>
        <div class="form-actions">
            <a href="{{ url_for('usuarios_lista') }}" class="btn btn-outline">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
        </div>
    </form>
</div>
{% endblock %}
