{% extends 'base.html' %}
{% block title %}{% if tarea %}Editar{% else %}Nueva{% endif %} Tarea - TaskFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h2>{% if tarea %}Editar tarea{% else %}Nueva tarea{% endif %}</h2>
    <a href="{{ url_for('tareas_lista') }}" class="btn btn-outline">← Volver</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="titulo">Título *</label>
            <input type="text" id="titulo" name="titulo" required
                   value="{{ tarea.titulo if tarea else '' }}"
                   placeholder="¿En qué consiste esta tarea?">
            <!-- BOTÓN IA: sugerencia automática de título -->
            <button type="button" class="btn btn-sm btn-outline" id="btn-ia" onclick="sugerirTitulo()">
                ✨ Sugerir con IA
            </button>
        </div>

        <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion" rows="4"
                      placeholder="Describe la tarea en detalle...">{{ tarea.descripcion if tarea else '' }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="estado">Estado *</label>
                <select id="estado" name="estado" required>
                    <option value="pendiente" {% if tarea and tarea.estado == 'pendiente' %}selected{% endif %}>Pendiente</option>
                    <option value="en_progreso" {% if tarea and tarea.estado == 'en_progreso' %}selected{% endif %}>En progreso</option>
                    <option value="completada" {% if tarea and tarea.estado == 'completada' %}selected{% endif %}>Completada</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fecha_limite">Fecha límite</label>
                <input type="date" id="fecha_limite" name="fecha_limite"
                       value="{{ tarea.fecha_limite if tarea else '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="proyecto_id">Proyecto</label>
                <select id="proyecto_id" name="proyecto_id">
                    <option value="">— Sin proyecto —</option>
                    {% for proyecto in proyectos %}
                    <option value="{{ proyecto.id }}"
                        {% if tarea and tarea.proyecto_id == proyecto.id %}selected{% endif %}>
                        {{ proyecto.nombre }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="asignado_a">Asignar a</label>
                <select id="asignado_a" name="asignado_a">
                    {% for usuario in usuarios %}
                    <option value="{{ usuario.id }}"
                        {% if tarea and tarea.asignado_a == usuario.id %}selected
                        {% elif not tarea and usuario.id == session.user_id %}selected{% endif %}>
                        {{ usuario.nombre }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('tareas_lista') }}" class="btn btn-outline">Cancelar</a>
            <button type="submit" class="btn btn-primary">
                {% if tarea %}Guardar cambios{% else %}Crear tarea{% endif %}
            </button>
        </div>
    </form>
</div>

<script>
// FUNCIÓN IA: llama al backend para sugerir un título
function sugerirTitulo() {
    const descripcion = document.getElementById('descripcion').value;
    if (!descripcion.trim()) {
        alert('Escribe una descripción primero para que la IA pueda sugerir un título.');
        return;
    }
    const btn = document.getElementById('btn-ia');
    btn.textContent = '⏳ Pensando...';
    btn.disabled = true;

    fetch('/api/sugerir-titulo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ descripcion: descripcion })
    })
    .then(r => r.json())
    .then(data => {
        if (data.titulo) {
            document.getElementById('titulo').value = data.titulo;
        } else {
            alert('No se pudo obtener sugerencia. Verifica que ANTHROPIC_API_KEY esté configurada.');
        }
    })
    .catch(() => alert('Error de conexión con la IA'))
    .finally(() => {
        btn.textContent = '✨ Sugerir con IA';
        btn.disabled = false;
    });
}
</script>
{% endblock %}
