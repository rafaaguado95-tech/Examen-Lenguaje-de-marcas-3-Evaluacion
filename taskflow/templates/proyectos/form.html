{% extends 'base.html' %}
{% block title %}{% if proyecto %}Editar{% else %}Nuevo{% endif %} Proyecto - TaskFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h2>{% if proyecto %}Editar proyecto{% else %}Nuevo proyecto{% endif %}</h2>
    <a href="{{ url_for('proyectos_lista') }}" class="btn btn-outline">← Volver</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="nombre">Nombre del proyecto *</label>
            <input type="text" id="nombre" name="nombre" required
                   value="{{ proyecto.nombre if proyecto else '' }}"
                   placeholder="Nombre del proyecto">
        </div>
        <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion" rows="4"
                      placeholder="¿De qué trata este proyecto?">{{ proyecto.descripcion if proyecto else '' }}</textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('proyectos_lista') }}" class="btn btn-outline">Cancelar</a>
            <button type="submit" class="btn btn-primary">
                {% if proyecto %}Guardar cambios{% else %}Crear proyecto{% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
